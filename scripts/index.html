<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Explorer</title>
  </head>
  <body>
    <script>
      async function fetchJson(url) {
        const res = await fetch(url, {
          headers: { accept: "application/json" }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
        return res.json();
      }

      async function fetchWikiSummary(topic, lang) {
        const url =
          `https://${lang}.wikipedia.org/api/rest_v1/page/summary/` +
          encodeURIComponent(topic);

        try {
          const data = await fetchJson(url);
          if (data && data.title && (data.extract || data.description)) {
            return data;
          }
        } catch (_) {
        }

        const searchUrl =
          `https://${lang}.wikipedia.org/w/api.php` +
          `?origin=*` +
          `&action=query` +
          `&list=search` +
          `&srsearch=${encodeURIComponent(topic)}` +
          `&format=json`;

        const search = await fetchJson(searchUrl);
        const first = search?.query?.search?.[0];
        if (!first?.title) {
          throw new Error(`No Wikipedia article found for "${topic}"`);
        }

        const fallbackUrl =
          `https://${lang}.wikipedia.org/api/rest_v1/page/summary/` +
          encodeURIComponent(first.title);

        return fetchJson(fallbackUrl);
      }

      async function imageUrlToBase64(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Image fetch failed: HTTP ${res.status}`);

        const blob = await res.blob();
        if (!blob.type.startsWith("image/")) {
          throw new Error(`Fetched file is not an image: ${blob.type || "unknown type"}`);
        }

        return await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            try {
              const dataUrl = String(reader.result || "");
              const commaIndex = dataUrl.indexOf(",");
              if (commaIndex === -1) {
                reject(new Error("Invalid data URL generated from image blob"));
                return;
              }
              resolve(dataUrl.slice(commaIndex + 1));
            } catch (err) {
              reject(err);
            }
          };
          reader.onerror = () => reject(new Error("Failed converting image to base64"));
          reader.readAsDataURL(blob);
        });
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const jsonData = JSON.parse(data);
          const topic = String(jsonData.query || jsonData.topic || "").trim();
          const lang = String(jsonData.lang || "en").trim().toLowerCase();
          const includeImages = Boolean(jsonData.include_images);

          if (!topic) {
            return JSON.stringify({ error: "No topic provided to search." });
          }

          const summary = await fetchWikiSummary(topic, lang);

          const title = String(summary?.title || topic).trim();
          const extract = String(summary?.extract || "").trim();
          const description = String(summary?.description || "").trim();
          const thumb =
            summary?.thumbnail?.source ||
            summary?.originalimage?.source ||
            "";

          let resultText = extract || description || `No summary available for ${title}.`;

          const response = {
            title,
            result: resultText
          };

          if (includeImages) {
            if (!thumb) {
              response.result += `\n\n[Image status: no thumbnail available from Wikipedia summary]`;
            } else {
              try {
                const base64 = await imageUrlToBase64(thumb);
                response.image = { base64 };
                response.result += `\n\n[Image status: included]`;
              } catch (imageError) {
                response.result += `\n\n[Image status: failed - ${imageError.message}]`;
              }
            }
          }

          return JSON.stringify(response);
        } catch (e) {
          console.error(e);
          return JSON.stringify({
            error: `Failed to query Wikipedia: ${e.message}`
          });
        }
      };
    </script>
  </body>
</html>
