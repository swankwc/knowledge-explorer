<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Explorer</title>
  </head>
  <body>
    <script>
      async function fetchJson(url) {
        const res = await fetch(url, { headers: { accept: "application/json" } });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      }

      async function fetchSummary(topic, lang) {
        const searchUrl =
          `https://${lang}.wikipedia.org/w/api.php` +
          `?origin=*` +
          `&action=query` +
          `&list=search` +
          `&srsearch=${encodeURIComponent(topic)}` +
          `&format=json`;

        const search = await fetchJson(searchUrl);
        const first = search?.query?.search?.[0];
        if (!first?.title) {
          throw new Error(`No Wikipedia article found for "${topic}"`);
        }

        const summaryUrl =
          `https://${lang}.wikipedia.org/api/rest_v1/page/summary/` +
          encodeURIComponent(first.title);

        return fetchJson(summaryUrl);
      }

      async function imageUrlToBase64(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`Image fetch failed: HTTP ${res.status}`);

        const blob = await res.blob();
        return await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => {
            const dataUrl = String(reader.result || "");
            const comma = dataUrl.indexOf(",");
            if (comma === -1) {
              reject(new Error("Bad image data"));
              return;
            }
            resolve(dataUrl.slice(comma + 1));
          };
          reader.onerror = () => reject(new Error("Base64 conversion failed"));
          reader.readAsDataURL(blob);
        });
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const input = JSON.parse(data);
          const query = String(input.query || "").trim();
          const lang = String(input.lang || "en").trim().toLowerCase();
          const includeImages = Boolean(input.include_images);

          if (!query) {
            return JSON.stringify({ error: "No topic provided." });
          }

          const summary = await fetchSummary(query, lang);

          const title = String(summary?.title || query).trim();
          let result = String(summary?.extract || summary?.description || "").trim();

          if (result.length > 700) {
            result = result.slice(0, 700) + "...";
          }

          const response = {
            title,
            result: result || `No summary available for ${title}.`
          };

          if (includeImages) {
            const imageUrl =
              summary?.thumbnail?.source ||
              summary?.originalimage?.source ||
              "";

            if (imageUrl) {
              try {
                const base64 = await imageUrlToBase64(imageUrl);
                response.image = { base64 };
              } catch (e) {
                response.result += ` [Image failed: ${e.message}]`;
              }
            } else {
              response.result += ` [No image available]`;
            }
          }

          return JSON.stringify(response);
        } catch (e) {
          return JSON.stringify({ error: `Failed: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
