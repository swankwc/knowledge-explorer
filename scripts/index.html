<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knowledge Explorer Runner</title>
  </head>
  <body>
    <script>
      function pickMode(data) {
        const allowed = new Set(["overview", "gallery", "timeline", "audio", "compare", "study"]);
        return allowed.has(data.mode) ? data.mode : "overview";
      }

      function normalizeArray(value) {
        return Array.isArray(value)
          ? value.map((item) => String(item || "").trim()).filter(Boolean)
          : [];
      }

      function safeText(value) {
        return String(value || "").trim();
      }

      async function fetchJson(url) {
        const response = await fetch(url, {
          headers: {
            "accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error("Request failed: " + response.status + " " + response.statusText);
        }

        return response.json();
      }

      async function searchWikipedia(query, lang) {
        const url =
          "https://" +
          encodeURIComponent(lang) +
          ".wikipedia.org/w/api.php" +
          "?origin=*" +
          "&action=query" +
          "&list=search" +
          "&srsearch=" + encodeURIComponent(query) +
          "&format=json";

        const data = await fetchJson(url);
        const first = data && data.query && data.query.search && data.query.search[0];
        return first || null;
      }

      async function fetchWikipediaSummary(title, lang) {
        const url =
          "https://" +
          encodeURIComponent(lang) +
          ".wikipedia.org/api/rest_v1/page/summary/" +
          encodeURIComponent(title);

        return fetchJson(url);
      }

      async function fetchWikipediaImages(title, lang) {
        const url =
          "https://" +
          encodeURIComponent(lang) +
          ".wikipedia.org/w/api.php" +
          "?origin=*" +
          "&action=query" +
          "&prop=images" +
          "&titles=" + encodeURIComponent(title) +
          "&imlimit=12" +
          "&format=json";

        const data = await fetchJson(url);
        const pages = data && data.query && data.query.pages ? data.query.pages : {};
        const firstPage = Object.values(pages)[0];
        const images = firstPage && Array.isArray(firstPage.images) ? firstPage.images : [];

        const filtered = images
          .map(function (item) { return item && item.title ? item.title : ""; })
          .filter(function (name) {
            const lower = name.toLowerCase();
            return (
              lower.endsWith(".jpg") ||
              lower.endsWith(".jpeg") ||
              lower.endsWith(".png") ||
              lower.endsWith(".webp") ||
              lower.endsWith(".svg")
            );
          })
          .slice(0, 8);

        if (!filtered.length) return [];

        const infoUrl =
          "https://commons.wikimedia.org/w/api.php" +
          "?origin=*" +
          "&action=query" +
          "&titles=" + filtered.map(encodeURIComponent).join("|") +
          "&prop=imageinfo" +
          "&iiprop=url" +
          "&format=json";

        const infoData = await fetchJson(infoUrl);
        const infoPages = infoData && infoData.query && infoData.query.pages ? infoData.query.pages : {};

        return Object.values(infoPages)
          .map(function (page) {
            const imageinfo = page && page.imageinfo && page.imageinfo[0];
            return {
              title: page && page.title ? page.title.replace(/^File:/, "") : "",
              url: imageinfo && imageinfo.url ? imageinfo.url : ""
            };
          })
          .filter(function (item) { return item.url; });
      }

      function buildFactCards(summary, mode, lang, includeImages, includeAudio) {
        const cards = [];

        cards.push({ label: "Mode", value: mode });
        cards.push({ label: "Language", value: lang });
        cards.push({ label: "Images", value: includeImages ? "requested" : "off" });
        cards.push({ label: "Audio", value: includeAudio ? "requested" : "off" });

        if (summary && summary.description) {
          cards.push({ label: "Type", value: summary.description });
        }

        if (summary && summary.titles && summary.titles.normalized) {
          cards.push({ label: "Article", value: summary.titles.normalized });
        }

        return cards;
      }

      function buildTimeline(summary) {
        const text = safeText(summary && summary.extract);
        if (!text) return [];

        const sentences = text
          .split(/(?<=[.!?])\s+/)
          .map(function (s) { return s.trim(); })
          .filter(Boolean);

        return sentences.slice(0, 5);
      }

      async function buildTopicResult(query, lang, mode, includeImages, includeAudio) {
        const match = await searchWikipedia(query, lang);

        if (!match || !match.title) {
          return {
            found: false,
            query: query,
            message: "No close Wikipedia result was found for " + query + "."
          };
        }

        const summary = await fetchWikipediaSummary(match.title, lang);
        const images = includeImages ? await fetchWikipediaImages(match.title, lang) : [];

        return {
          found: true,
          query: query,
          title: safeText(summary && summary.title) || match.title,
          canonicalTitle:
            (summary && summary.titles && summary.titles.normalized) ||
            match.title,
          description: safeText(summary && summary.description),
          summary: safeText(summary && summary.extract),
          articleUrl:
            summary && summary.content_urls && summary.content_urls.desktop
              ? summary.content_urls.desktop.page
              : "",
          thumbnailUrl:
            summary && summary.thumbnail && summary.thumbnail.source
              ? summary.thumbnail.source
              : "",
          images: images,
          facts: buildFactCards(summary, mode, lang, includeImages, includeAudio),
          timeline: buildTimeline(summary)
        };
      }

      function buildCompareSummary(primary, relatedResults) {
        const titles = [primary.title].concat(
          relatedResults.filter(function (item) { return item.found; }).map(function (item) { return item.title; })
        );

        return "Comparison view for " + titles.join(" vs. ") + ".";
      }

      window.ai_edge_gallery_get_result = async function (data) {
        try {
          const payload = data || {};
          const query = safeText(payload.query);
          const lang = safeText(payload.lang) || "en";
          const mode = pickMode(payload);
          const includeImages = Boolean(payload.include_images);
          const includeAudio = Boolean(payload.include_audio);
          const relatedQueries = normalizeArray(payload.related_queries);

          if (!query) {
            return { error: "Missing required field: query" };
          }

          const primary = await buildTopicResult(query, lang, mode, includeImages, includeAudio);

          if (!primary.found) {
            return {
              result: {
                status: "not-found",
                mode: mode,
                message: primary.message,
                data: primary
              }
            };
          }

          let relatedResults = [];
          if (mode === "compare" && relatedQueries.length) {
            relatedResults = await Promise.all(
              relatedQueries.slice(0, 3).map(function (item) {
                return buildTopicResult(item, lang, "overview", false, false);
              })
            );
          }

          const resultData = {
            mode: mode,
            primary: primary,
            relatedResults: relatedResults,
            requestedAudio: includeAudio,
            requestedImages: includeImages
          };

          const state = encodeURIComponent(JSON.stringify(resultData));

          let message = primary.summary || ("Overview requested for " + primary.title + ".");
          if (mode === "compare" && relatedResults.length) {
            message = buildCompareSummary(primary, relatedResults);
          } else if (mode === "gallery") {
            message = "Gallery view for " + primary.title + ".";
          } else if (mode === "timeline") {
            message = "Timeline view for " + primary.title + ".";
          } else if (mode === "study") {
            message = "Study view for " + primary.title + ".";
          } else if (mode === "audio") {
            message = "Audio-style overview for " + primary.title + ".";
          }

          return {
            result: {
              status: "live-v1",
              mode: mode,
              message: message,
              data: resultData,
              webview: {
                url: "./assets/webview.html?state=" + state
              }
            }
          };
        } catch (error) {
          return {
            error: error instanceof Error ? error.message : String(error)
          };
        }
      };
    </script>
  </body>
</html>
