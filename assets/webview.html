<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Knowledge Explorer</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 20px;
        background: Canvas;
        color: CanvasText;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }
      .card {
        border: 1px solid rgba(127,127,127,.35);
        border-radius: 16px;
        padding: 16px;
        background: rgba(127,127,127,.06);
      }
      h1, h2, h3, p {
        margin-top: 0;
      }
      .hero {
        display: grid;
        gap: 16px;
      }
      .facts {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
      }
      .fact {
        padding: 12px;
        border-radius: 12px;
        background: rgba(127,127,127,.08);
      }
      .label {
        font-size: .82rem;
        opacity: .75;
        margin-bottom: 4px;
      }
      .muted {
        opacity: .8;
      }
      .thumb {
        max-width: 220px;
        width: 100%;
        border-radius: 12px;
        display: block;
      }
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
      }
      .gallery-item img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 12px;
        display: block;
      }
      ul {
        margin: 0;
        padding-left: 20px;
      }
      a {
        color: inherit;
      }
      .compare-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      .compare-card {
        padding: 12px;
        border-radius: 12px;
        background: rgba(127,127,127,.08);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card hero">
        <div>
          <h1 id="title">Knowledge Explorer</h1>
          <p id="description" class="muted"></p>
          <p id="summary">Waiting for data.</p>
          <p><a id="article-link" href="#" target="_blank" rel="noopener noreferrer">Open article</a></p>
        </div>
        <div id="thumb-wrap"></div>
      </section>

      <section class="card">
        <h2>Facts</h2>
        <div id="facts" class="facts"></div>
      </section>

      <section class="card">
        <h2>Timeline / Key Sentences</h2>
        <ul id="timeline"></ul>
      </section>

      <section class="card">
        <h2>Image Gallery</h2>
        <div id="gallery" class="gallery"></div>
      </section>

      <section class="card">
        <h2>Compare</h2>
        <div id="compare" class="compare-grid"></div>
      </section>
    </div>

    <script>
      function parseState() {
        const params = new URLSearchParams(window.location.search);
        const raw = params.get("state");
        if (!raw) return null;
        try {
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      function renderFacts(facts) {
        const container = document.getElementById("facts");
        container.innerHTML = "";
        (facts || []).forEach(function (fact) {
          const div = document.createElement("div");
          div.className = "fact";
          div.innerHTML =
            '<div class="label">' + fact.label + "</div><div>" + fact.value + "</div>";
          container.appendChild(div);
        });
      }

      function renderList(id, items, emptyText) {
        const el = document.getElementById(id);
        el.innerHTML = "";
        if (!items || !items.length) {
          const li = document.createElement("li");
          li.textContent = emptyText;
          el.appendChild(li);
          return;
        }
        items.forEach(function (item) {
          const li = document.createElement("li");
          li.textContent = item;
          el.appendChild(li);
        });
      }

      function renderThumbnail(url, title) {
        const wrap = document.getElementById("thumb-wrap");
        wrap.innerHTML = "";
        if (!url) return;
        const img = document.createElement("img");
        img.src = url;
        img.alt = title || "Thumbnail";
        img.className = "thumb";
        wrap.appendChild(img);
      }

      function renderGallery(images) {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        if (!images || !images.length) {
          const p = document.createElement("p");
          p.textContent = "No gallery images available.";
          gallery.appendChild(p);
          return;
        }

        images.forEach(function (item) {
          const card = document.createElement("div");
          card.className = "gallery-item";
          const img = document.createElement("img");
          img.src = item.url;
          img.alt = item.title || "Image";
          card.appendChild(img);
          gallery.appendChild(card);
        });
      }

      function renderCompare(items) {
        const compare = document.getElementById("compare");
        compare.innerHTML = "";

        if (!items || !items.length) {
          const p = document.createElement("p");
          p.textContent = "No comparison topics requested.";
          compare.appendChild(p);
          return;
        }

        items.forEach(function (item) {
          const card = document.createElement("div");
          card.className = "compare-card";
          card.innerHTML =
            "<h3>" + (item.title || item.query || "Topic") + "</h3>" +
            "<p class='muted'>" + (item.description || "No description") + "</p>" +
            "<p>" + (item.summary || "No summary available.") + "</p>";
          compare.appendChild(card);
        });
      }

      const state = parseState();
      if (state && state.primary) {
        const primary = state.primary;

        document.getElementById("title").textContent = primary.title || "Knowledge Explorer";
        document.getElementById("description").textContent = primary.description || "";
        document.getElementById("summary").textContent = primary.summary || "No summary available.";

        const link = document.getElementById("article-link");
        if (primary.articleUrl) {
          link.href = primary.articleUrl;
        } else {
          link.style.display = "none";
        }

        renderThumbnail(primary.thumbnailUrl, primary.title);
        renderFacts(primary.facts || []);
        renderList("timeline", primary.timeline || [], "No timeline items available.");
        renderGallery(primary.images || []);
        renderCompare(state.relatedResults || []);
      }
    </script>
  </body>
</html>
